# .github/workflows/ci.yml
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas matplotlib

      - name: Configure CMake
        run: |
          cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ project
        run: |
          cmake --build cpp/build --config Release

      - name: Run equal model
        run: |
          chmod +x start_traffic_model.sh
          ./start_traffic_model.sh \
            examples/equal_10_10.txt \
            examples/results/equal/output.csv \
            equal \
            67 \
            examples/results/equal/plots

      - name: Run poisson model
        run: |
          ./start_traffic_model.sh \
            examples/poisson_10_10.txt \
            examples/results/poisson/output.csv \
            poisson \
            67 \
            examples/results/poisson/plots

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: trafficmodel-results
          path: |
            cpp/build/trafficmodel
            examples/results